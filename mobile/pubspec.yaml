name: zamlift
description: ZamLift — inter-city ride-sharing for Zambia.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2

  # Secure token persistence
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Persistent preferences (theme, onboarding, etc.)
  shared_preferences: ^2.3.2

  # Real-time Socket.io chat
  socket_io_client: ^2.0.3+1

  # Date / number formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
